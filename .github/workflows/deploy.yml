name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: 3.76.192.105
          username: claude
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /services/chess-com/frontend
            git pull
            npm install --production=false
            npm run build
            sudo systemctl restart chess-frontend
